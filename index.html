<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>metronome test</title>
</head>
<body>

<h1>metronome test - 006</h1>

<button onclick="playClick(100, 0.002, 0.1)">kick</button>
<button onclick="playClick(1000, 0.002, 0.1)">snare</button>
<button onclick="playClick(5000, 0.002, 0.1)">accent</button>

<button onclick="start()">start</button>
<button onclick="stop()">stop</button>


<label for="bpm">BPM:</label>
<input type="range" id="bpm" name="bpm" min="20" max="250" value="60">
<span id="bpmValue">60</span>

<label for="volume">Volume:</label>
<input type="range" id="volume" name="volume" min="0" max=".3" step="0.01" value="0.1">
<span id="volumeValue">0.1</span>

<label for="pitch">Pitch:</label>
<input type="range" id="pitch" name="pitch" min="50" max="3000" value="2000">
<span id="pitchValue">2000</span>

<label for="duration">Duration (s):</label>
<input type="range" id="duration" name="duration" min="0.0005" max="0.01" step="0.0005" value="0.002">
<span id="durationValue">0.002</span>


<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let isPlaying = false;
let timerID = null;

let nextNoteTime = 0; // when the next note is due
let currentBeat = 0; // the current beat number

const lookahead = 25.0; // How frequently to call scheduling function (in milliseconds)
const scheduleAheadTime = 0.1; // How far ahead to schedule audio (seconds)

let intervalId = null;

// we want to feed the bpm, volume, pitch and duration from the sliders
const bpmSlider = document.getElementById('bpm');
const volumeSlider = document.getElementById('volume');
const pitchSlider = document.getElementById('pitch');
const durationSlider = document.getElementById('duration');

bpmSlider.addEventListener('input', () => {
  document.getElementById('bpmValue').textContent = bpmSlider.value;
});

volumeSlider.addEventListener('input', () => {
  document.getElementById('volumeValue').textContent = volumeSlider.value;
});

pitchSlider.addEventListener('input', () => {
  document.getElementById('pitchValue').textContent = pitchSlider.value;
});

durationSlider.addEventListener('input', () => {
  document.getElementById('durationValue').textContent = durationSlider.value;
});

function nextNote() {
  const bpm = Number(bpmSlider.value);
  const secondsPerBeat = 60.0 / bpm;
  nextNoteTime += secondsPerBeat; // Add beat length to last beat time

  currentBeat++; // Advance the beat number, wrap to zero
  if (currentBeat === 4) {
    currentBeat = 0;
  }
}

function scheduleClick(time) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.frequency.value = Number(pitchSlider.value); // pitch of click
  currentVolume = Number(volumeSlider.value);
  gain.gain.setValueAtTime(0.001*currentVolume, time);
  gain.gain.exponentialRampToValueAtTime(currentVolume, time);
  gain.gain.exponentialRampToValueAtTime(0.001*currentVolume, time + Number(durationSlider.value)); // quick decay

  osc.start(time);
  osc.stop(time + Number(durationSlider.value)); // very short sound
}

function scheduler() {
  while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
    scheduleClick(nextNoteTime);
    nextNote();
  }
}

setInterval(scheduler, lookahead);

nextNoteTime = audioCtx.currentTime + 0.05; // Start a little in the future to allow scheduling


function playClick(frequency = 1000, duration = 0.002, volume = 0.1) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.frequency.value = frequency; // pitch of click
  
  const now = audioCtx.currentTime;
  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(volume, now + duration / 2); // quick attack
  gain.gain.linearRampToValueAtTime(0, now + duration);

  osc.start();
  osc.stop(audioCtx.currentTime + duration); // very short sound
}

function start() {

  if (isPlaying) return;
  isPlaying = true;

  audioCtx.resume();

  nextNoteTime = audioCtx.currentTime + 0.05; // Start a little in the future to allow scheduling
  currentBeat = 0;

  clearInterval(timerID);
  timerID = setInterval(scheduler, lookahead);

  // const bpm = Number(bpmSlider.value);
  // const interval = 60000 / bpm; // milliseconds

  // intervalId = setInterval(() => playClick(frequency = Number(pitchSlider.value), duration = Number(durationSlider.value), volume = Number(volumeSlider.value)), interval);
}

function stop() {
  if (!isPlaying) return;
  isPlaying = false;
  clearInterval(timerID);
  timerID = null;
}


</script>

</body>
</html>
