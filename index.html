<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>metronome test</title>
</head>
<body>

// we want to display a title so we know which version of the code we are testing
<h1>metronome test - 001</h1>

<button onclick="playClick(100, 0.002, 0.1)">kick</button1>
<button onclick="playClick(1000, 0.002, 0.1)">snare</button2>
<button onclick="playClick(10000, 0.002, 0.1)">accent</button3>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playClick(frequency = 1000, duration = 0.002, volume = 0.1) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.frequency.value = frequency; // pitch of click
  gain.gain.value = volume;        // volume

  osc.start();
  osc.stop(audioCtx.currentTime + duration); // very short sound
}


</script>

</body>
</html>
