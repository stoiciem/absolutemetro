<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>metronome test</title>
</head>
<body>

<h1>metronome test - 002</h1>

<button onclick="playClick(100, 0.002, 0.1)">kick</button>
<button onclick="playClick(1000, 0.002, 0.1)">snare</button>
<button onclick="playClick(5000, 0.002, 0.1)">accent</button>

<button onclick="start()">start</button>
<button onclick="stop()">stop</button>

we want to add a slider to change the bpm, the volume and the pitch and the volume of the click sound.

<label for="bpm">BPM:</label>
<input type="range" id="bpm" name="bpm" min="1" max="1000" value="60">
<span id="bpmValue">60</span>

<label for="volume">Volume:</label>
<input type="range" id="volume" name="volume" min="0" max="1" step="0.01" value="0.1">
<span id="volumeValue">0.1</span>

<label for="pitch">Pitch:</label>
<input type="range" id="pitch" name="pitch" min="100" max="10000" value="2000">
<span id="pitchValue">2000</span>

<label for="duration">Duration (s):</label>
<input type="range" id="duration" name="duration" min="0.0001" max="0.1" step="0.0001" value="0.002">
<span id="durationValue">0.002</span>


<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let intervalId = null;

// we want to feed the bpm, volume, pitch and duration from the sliders
const bpmSlider = document.getElementById('bpm');
const volumeSlider = document.getElementById('volume');
const pitchSlider = document.getElementById('pitch');
const durationSlider = document.getElementById('duration');

bpmSlider.addEventListener('input', () => {
  document.getElementById('bpmValue').textContent = bpmSlider.value;
});

volumeSlider.addEventListener('input', () => {
  document.getElementById('volumeValue').textContent = volumeSlider.value;
});

pitchSlider.addEventListener('input', () => {
  document.getElementById('pitchValue').textContent = pitchSlider.value;
});

durationSlider.addEventListener('input', () => {
  document.getElementById('durationValue').textContent = durationSlider.value;
});


function playClick(frequency = pitchSlider.value, duration = durationSlider.value, volume = volumeSlider.value) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.frequency.value = frequency; // pitch of click
  gain.gain.value = volume;        // volume

  osc.start();
  osc.stop(audioCtx.currentTime + duration); // very short sound
}

function start() {
  audioCtx.resume();

  const bpm = bpmSlider.value;
  const interval = 60000 / bpm; // milliseconds

  intervalId = setInterval(() => playClick(), interval);
}

function stop() {
  clearInterval(intervalId);
}


</script>

</body>
</html>
